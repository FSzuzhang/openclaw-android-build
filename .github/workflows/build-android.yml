name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          ANDROID_SDK_ROOT="$HOME/.android-sdk"
          CMDLINE_TOOLS_VERSION="14742923"
          ARCHIVE="commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          URL="https://dl.google.com/android/repository/${ARCHIVE}"

          if [ ! -x "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" ]; then
            mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
            curl -fsSL "$URL" -o "/tmp/${ARCHIVE}"
            rm -rf "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
            unzip -q "/tmp/${ARCHIVE}" -d "${ANDROID_SDK_ROOT}/cmdline-tools"
            mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          fi

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"

          SDKMANAGER="${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          yes | "${SDKMANAGER}" --sdk_root="${ANDROID_SDK_ROOT}" --licenses || true
          "${SDKMANAGER}" --sdk_root="${ANDROID_SDK_ROOT}" --install "platform-tools" "platforms;android-37" "build-tools;34.0.0" || true

      - name: Build ThirdParty Debug APK (Full Features!)
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleThirdPartyDebug --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apk
          path: app/build/outputs/apk/thirdParty/debug/*.apk
          retention-days: 30