name: Build Android APK

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        run: |
          set -euo pipefail
          ANDROID_SDK_ROOT="$HOME/.android-sdk"
          CMDLINE_TOOLS_VERSION="14742923"
          ARCHIVE="commandlinetools-linux-${CMDLINE_TOOLS_VERSION}_latest.zip"
          URL="https://dl.google.com/android/repository/${ARCHIVE}"

          mkdir -p "${ANDROID_SDK_ROOT}/cmdline-tools"
          curl -fsSL "${URL}" -o "/tmp/${ARCHIVE}"
          rm -rf "${ANDROID_SDK_ROOT}/cmdline-tools/latest"
          unzip -q "/tmp/${ARCHIVE}" -d "${ANDROID_SDK_ROOT}/cmdline-tools"
          mv "${ANDROID_SDK_ROOT}/cmdline-tools/cmdline-tools" "${ANDROID_SDK_ROOT}/cmdline-tools/latest"

          echo "ANDROID_SDK_ROOT=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "ANDROID_HOME=${ANDROID_SDK_ROOT}" >> "${GITHUB_ENV}"
          echo "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin" >> "${GITHUB_PATH}"
          echo "${ANDROID_SDK_ROOT}/platform-tools" >> "${GITHUB_PATH}"

          yes | "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" --licenses >/dev/null
          "${ANDROID_SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager" --sdk_root="${ANDROID_SDK_ROOT}" --install \
            "platform-tools" \
            "platforms;android-37" \
            "build-tools;36.0.0"

      - name: Build Third Party Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assembleThirdPartyDebug

      - name: Build Play Debug APK
        run: |
          chmod +x gradlew
          ./gradlew :app:assemblePlayDebug

      - name: Upload APK artifacts
        uses: actions/upload-artifact@v4
        with:
          name: openclaw-android-apks
          path: |
            app/build/outputs/apk/thirdParty/debug/*.apk
            app/build/outputs/apk/play/debug/*.apk
          retention-days: 30
